<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Trace Detail</title>

  <link rel="stylesheet" href="assets/css/style.css" />

  <style>
    .container { padding: 12px; }

    .panel {
      background: #1e293b;
      padding: 14px;
      margin-bottom: 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .summary-line {
      font-size: 13px;
      opacity: 0.85;
      margin-top: 4px;
    }

    .health { font-weight: 600; }
    .good { color: #4ade80; }
    .warn { color: #facc15; }
    .bad { color: #f87171; }

    .event {
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .event:last-child { border-bottom: none; }

    .gap {
      font-size: 11px;
      opacity: 0.5;
      margin: 6px 0;
    }

    .flow-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
    }

    .flow-node { flex: 1; font-size: 13px; }

    .flow-link {
      font-size: 11px;
      opacity: 0.8;
      white-space: nowrap;
    }

    .flow-link.triggered { color: #4ade80; }
    .flow-link.fallback { color: #f87171; }
    .flow-link.retry { color: #facc15; }
    .flow-link.chained { color: #60a5fa; }

    .anomaly {
      font-size: 12px;
      color: #f87171;
      margin-top: 6px;
    }

    .cross-link {
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 8px;
      background: rgba(255,255,255,0.04);
      cursor: pointer;
      font-size: 13px;
      transition: 0.15s;
    }

    .cross-link:hover {
      background: rgba(255,255,255,0.08);
    }

    .confidence {
      font-size: 11px;
      opacity: 0.6;
      margin-left: 6px;
    }

    .empty {
      text-align: center;
      opacity: 0.5;
      padding: 20px;
    }

    .error { color: #f87171; }
  </style>
</head>

<body>

<header class="app-header">
  <a href="trace-viewer.html" class="back-link">← Back</a>
  <h1>Trace Detail</h1>
</header>

<main class="container">
  <div id="traceDetail" class="empty">Loading trace...</div>
</main>

<script>
const TRACE_BASE =
  "https://raw.githubusercontent.com/sovereign-codex/AVOT-TRACE/main/traces/";

const TRACE_INDEX =
  "https://raw.githubusercontent.com/sovereign-codex/AVOT-TRACE/main/data/trace-index.json";

const CROSS_TRACE_PATH =
  "https://raw.githubusercontent.com/sovereign-codex/Codex-net-index/main/relationships/generated/cross-trace-intelligence.json";

/* ---------- PARAM ---------- */
function getTraceId() {
  const params = new URLSearchParams(window.location.search);
  return params.get("id") || params.get("trace_id");
}

/* ---------- CORE ---------- */
function classify(prev, next) {
  const ps = (prev.status || "").toLowerCase();

  if (ps.includes("fail") || ps.includes("error")) return "fallback";
  if (prev.workflow === next.workflow) return "retry";
  if (ps.includes("success") || ps.includes("stored")) return "triggered";

  return "chained";
}

function computeHealth(events) {
  let score = 100;

  events.forEach(e => {
    const s = (e.status || "").toLowerCase();
    if (s.includes("fail")) score -= 20;
    else if (s.includes("error")) score -= 25;
    else score += 5;
  });

  return Math.max(0, Math.min(100, score));
}

function detectAnomalies(events) {
  let anomalies = [];
  let retryCount = 0;

  for (let i = 1; i < events.length; i++) {
    if (events[i - 1].workflow === events[i].workflow) retryCount++;
  }

  if (retryCount >= 2) anomalies.push(`Retry loop (${retryCount + 1}x)`);

  const failCount = events.filter(e =>
    (e.status || "").toLowerCase().includes("fail")
  ).length;

  if (failCount >= 2) anomalies.push("Failure chain");

  return anomalies;
}

/* ---------- BUILD ---------- */
function buildFlow(events) {
  let output = [];
  let i = 0;

  while (i < events.length - 1) {
    const current = events[i];
    let count = 1;

    while (
      i + count < events.length &&
      events[i + count].workflow === current.workflow
    ) {
      count++;
    }

    const next = events[i + count];
    if (!next) break;

    const type = classify(current, next);

    output.push(`
      <div class="flow-row">
        <div class="flow-node">${current.workflow}</div>
        <div class="flow-link ${type}">
          → ${type}${count > 1 ? " ×" + count : ""}
        </div>
        <div class="flow-node">${next.workflow}</div>
      </div>
    `);

    i += count;
  }

  return output.join("");
}

function buildTimeline(events) {
  return events.map((e, i) => {
    let gapHTML = "";

    if (i > 0) {
      const diff =
        (new Date(e.timestamp) - new Date(events[i - 1].timestamp)) / 1000;

      if (diff > 10) {
        gapHTML = `<div class="gap">⏱ ${Math.round(diff)}s gap</div>`;
      }
    }

    return `
      ${gapHTML}
      <div class="event">
        <div><strong>${e.workflow}</strong></div>
        <div>${e.repo}</div>
        <div style="opacity:0.6;font-size:12px">${e.timestamp}</div>
        <div style="font-size:12px">${e.status}</div>
      </div>
    `;
  }).join("");
}

/* ---------- CROSS TRACE ---------- */
async function loadCrossTrace(traceId) {
  try {
    const res = await fetch(CROSS_TRACE_PATH, { cache: "no-store" });
    if (!res.ok) return [];

    const data = await res.json();
    return (data.relationships || []).filter(r =>
      r.from?.id === traceId || r.to?.id === traceId
    );

  } catch {
    return [];
  }
}

function renderCrossTrace(traceId, rels) {
  if (!rels.length) return `<div class="empty">No cross-trace links</div>`;

  const groups = {
    likely_triggered: [],
    recovered_by: [],
    same_execution_family: [],
    possibly_related: []
  };

  rels.forEach(r => {
    if (groups[r.type]) groups[r.type].push(r);
  });

  function group(title, items) {
    if (!items.length) return "";

    return `
      <div class="panel">
        <h3>${title}</h3>
        ${items.map(r => {
          const other = r.from.id === traceId ? r.to.id : r.from.id;
          return `
            <div class="cross-link" onclick="openTrace('${other}')">
              ${other}
              <span class="confidence">${Math.round((r.confidence||0)*100)}%</span>
            </div>
          `;
        }).join("")}
      </div>
    `;
  }

  return `
    ${group("⚡ Likely Triggers", groups.likely_triggered)}
    ${group("🛠 Recovery", groups.recovered_by)}
    ${group("🧬 Execution Family", groups.same_execution_family)}
    ${group("🔗 Related", groups.possibly_related)}
  `;
}

function openTrace(id) {
  window.location.href = `trace-detail.html?id=${encodeURIComponent(id)}`;
}

/* ---------- TRACE PICKER (FIX) ---------- */
async function loadRecentTraces(container) {
  try {
    const res = await fetch(TRACE_INDEX, { cache: "no-store" });

    if (!res.ok) {
      container.innerHTML = `<div class="empty">No trace index found</div>`;
      return;
    }

    const data = await res.json();
    const traces = (data.traces || []).slice(-10).reverse();

    if (!traces.length) {
      container.innerHTML = `<div class="empty">No traces available</div>`;
      return;
    }

    container.innerHTML = `
      <div class="panel">
        <h3>Select a Trace</h3>
        ${traces.map(t => `
          <div class="cross-link" onclick="openTrace('${t.trace_id}')">
            ${t.trace_id}
            <span class="confidence">${t.status || ""}</span>
          </div>
        `).join("")}
      </div>
    `;

  } catch {
    container.innerHTML = `<div class="empty error">Error loading traces</div>`;
  }
}

/* ---------- MAIN LOAD ---------- */
async function loadTrace() {
  const container = document.getElementById("traceDetail");
  const traceId = getTraceId();

  if (!traceId) {
    loadRecentTraces(container);
    return;
  }

  try {
    const res = await fetch(`${TRACE_BASE}${traceId}.json`, { cache: "no-store" });

    if (!res.ok) {
      container.innerHTML = `<div class="empty error">Trace not found</div>`;
      return;
    }

    const trace = await res.json();
    const events = trace.events || [];

    const health = computeHealth(events);
    const anomalies = detectAnomalies(events);
    const healthClass = health > 70 ? "good" : health > 40 ? "warn" : "bad";

    const cross = await loadCrossTrace(traceId);

    container.innerHTML = `
      <div class="panel">
        <h3>${trace.trace_id}</h3>
        <div class="summary-line health ${healthClass}">
          Health: ${health}%
        </div>
        <div class="summary-line">${events.length} events</div>
        ${anomalies.map(a => `<div class="anomaly">⚠ ${a}</div>`).join("")}
      </div>

      <div class="panel">
        <h3>Timeline</h3>
        ${buildTimeline(events)}
      </div>

      <div class="panel">
        <h3>Causal Flow</h3>
        ${buildFlow(events) || "<div class='empty'>No flow</div>"}
      </div>

      <div class="panel">
        <h3>Cross-Trace Intelligence</h3>
        ${renderCrossTrace(traceId, cross)}
      </div>
    `;

  } catch {
    container.innerHTML = `<div class="empty error">Error loading trace</div>`;
  }
}

loadTrace();
</script>

</body>
</html>
