<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Trace Detail</title>

  <link rel="stylesheet" href="assets/css/style.css">

  <style>
    .container {
      padding: 12px;
    }

    .section {
      margin-bottom: 20px;
    }

    .card {
      background: #1e293b;
      padding: 14px;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    .event {
      border-left: 2px solid #3b82f6;
      padding-left: 10px;
      margin-bottom: 12px;
    }

    .event-time {
      font-size: 11px;
      opacity: 0.6;
    }

    .event-flow {
      font-size: 13px;
    }

    .causal {
      font-size: 13px;
      padding: 10px;
      border-radius: 10px;
      background: #0f172a;
      margin-bottom: 8px;
    }

    .empty {
      opacity: 0.5;
      padding: 20px;
      text-align: center;
    }
  </style>
</head>

<body>

<header class="app-header">
  <a href="trace-viewer.html" class="back-link">← Back</a>
  <h1>Trace Detail</h1>
</header>

<main class="container">

  <div id="traceHeader" class="section"></div>

  <div class="section">
    <h3>Timeline</h3>
    <div id="timeline"></div>
  </div>

  <div class="section">
    <h3>Causal Flow</h3>
    <div id="causal"></div>
  </div>

</main>

<script>
function getTraceId() {
  const params = new URLSearchParams(window.location.search);
  return params.get("id");
}

async function loadTrace() {
  const traceId = getTraceId();

  const header = document.getElementById("traceHeader");
  const timeline = document.getElementById("timeline");
  const causal = document.getElementById("causal");

  if (!traceId) {
    header.innerHTML = `<div class="empty">No trace id</div>`;
    return;
  }

  header.innerHTML = `<div class="card"><strong>${traceId}</strong></div>`;

  try {
    const res = await fetch(`traces/${traceId}.json`, { cache: "no-store" });

    if (!res.ok) {
      timeline.innerHTML = `<div class="empty">Trace file not found</div>`;
      return;
    }

    const data = await res.json();
    const events = data.events || [];

    if (events.length === 0) {
      timeline.innerHTML = `<div class="empty">No events</div>`;
      return;
    }

    // ---- TIMELINE ----
    timeline.innerHTML = "";

    events.forEach(e => {
      const el = document.createElement("div");
      el.className = "event";

      el.innerHTML = `
        <div class="event-time">${e.timestamp}</div>
        <div class="event-flow">${e.repo} → ${e.workflow} → ${e.status}</div>
      `;

      timeline.appendChild(el);
    });

    // ---- CAUSAL BUILD ----
    causal.innerHTML = "";

    for (let i = 1; i < events.length; i++) {
      const prev = events[i - 1];
      const curr = events[i];

      const el = document.createElement("div");
      el.className = "causal";

      el.innerHTML = `
        ${prev.workflow} (${prev.status})
        →
        ${curr.workflow} (${curr.status})
      `;

      causal.appendChild(el);
    }

  } catch (err) {
    console.error(err);
    timeline.innerHTML = `<div class="empty">Error loading trace</div>`;
  }
}

loadTrace();
</script>

</body>
</html>
