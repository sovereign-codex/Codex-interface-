<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Trace Detail</title>
  <link rel="stylesheet" href="assets/css/style.css">

  <style>
    .section { margin-bottom: 18px; }
    .card {
      background: #0f172a;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 10px;
    }
    .label {
      font-size: 12px;
      opacity: 0.6;
      margin-bottom: 4px;
    }
    .link {
      color: #60a5fa;
      text-decoration: none;
    }
    .link:hover { text-decoration: underline; }
    .small { font-size: 12px; opacity: 0.7; }
  </style>
</head>

<body>

<header class="app-header">
  <a href="trace-viewer.html" class="link">← Back</a>
  <h1>Trace Detail</h1>
</header>

<main class="container">

  <div id="traceContainer">Loading trace...</div>

</main>

<script>

const TRACE_INDEX_PATH = "data/trace-relationship-index.json";
const REL_PATH = "relationships/generated/trace-relationships.json";
const CAUSAL_PATH = "relationships/generated/causal-relationships.json";

const params = new URLSearchParams(window.location.search);
const traceId = params.get("id");


async function loadAll() {
  const [indexRes, relRes, causalRes] = await Promise.all([
    fetch(TRACE_INDEX_PATH),
    fetch(REL_PATH),
    fetch(CAUSAL_PATH)
  ]);

  return {
    index: await indexRes.json(),
    rels: (await relRes.json()).relationships || [],
    causal: (await causalRes.json()).relationships || []
  };
}


function findTrace(index) {
  return index.traces.find(t => t.trace_id === traceId);
}


function renderTrace(trace) {
  return `
    <div class="card">
      <div class="label">Trace ID</div>
      <div>${trace.trace_id}</div>

      <div class="label">Repo</div>
      <div>${trace.repo}</div>

      <div class="label">Workflow</div>
      <div>${trace.workflow}</div>

      <div class="label">Status</div>
      <div>${trace.status}</div>

      <div class="label">Timestamp</div>
      <div class="small">${trace.timestamp}</div>
    </div>
  `;
}


function renderRelationships(rels) {
  if (!rels.length) return "<div class='small'>No relationships</div>";

  return rels.map(r => `
    <div class="card">
      <div>${r.type}</div>
      <div class="small">
        → ${r.to.kind}: 
        <a class="link" href="${buildLink(r.to)}">
          ${r.to.id}
        </a>
      </div>
    </div>
  `).join("");
}


function buildLink(to) {
  if (to.kind === "trace") {
    return `trace-detail.html?id=${to.id}`;
  }
  if (to.kind === "thread") {
    return `thread-explorer.html`;
  }
  return "#";
}


function splitCausal(causal) {
  const before = [];
  const after = [];

  for (const c of causal) {
    if (c.to.id === traceId) before.push(c);
    if (c.from.id === traceId) after.push(c);
  }

  return { before, after };
}


function renderCausalBlock(title, list, direction) {
  if (!list.length) return "<div class='small'>None</div>";

  return list.map(c => {
    const other = direction === "before" ? c.from.id : c.to.id;

    return `
      <div class="card">
        <div>${c.type}</div>
        <div class="small">
          ${direction === "before" ? "←" : "→"}
          <a class="link" href="trace-detail.html?id=${other}">
            ${other}
          </a>
        </div>
        <div class="small">
          confidence: ${c.confidence}
        </div>
      </div>
    `;
  }).join("");
}


async function main() {
  if (!traceId) {
    document.getElementById("traceContainer").innerHTML = "No trace id.";
    return;
  }

  const { index, rels, causal } = await loadAll();
  const trace = findTrace(index);

  if (!trace) {
    document.getElementById("traceContainer").innerHTML = "Trace not found.";
    return;
  }

  const direct = rels.filter(r => r.from.id === traceId);
  const { before, after } = splitCausal(causal);

  document.getElementById("traceContainer").innerHTML = `
    
    <section class="section">
      <h2>Trace</h2>
      ${renderTrace(trace)}
    </section>

    <section class="section">
      <h2>Direct Relationships</h2>
      ${renderRelationships(direct)}
    </section>

    <section class="section">
      <h2>Leads To</h2>
      ${renderCausalBlock("after", after, "after")}
    </section>

    <section class="section">
      <h2>Preceded By</h2>
      ${renderCausalBlock("before", before, "before")}
    </section>

    <section class="section">
      <a class="link" href="node-timeline.html?node=${trace.repo}">
        → View Node Timeline
      </a>
    </section>

  `;
}

main();

</script>

</body>
</html>
