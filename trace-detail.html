<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Trace Detail</title>

  <link rel="stylesheet" href="assets/css/style.css" />

  <style>
    .container { padding: 12px; }

    .panel {
      background: #1e293b;
      padding: 14px;
      margin-bottom: 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .summary-line {
      font-size: 13px;
      opacity: 0.85;
      margin-top: 4px;
    }

    .health {
      font-weight: 600;
    }

    .good { color: #4ade80; }
    .warn { color: #facc15; }
    .bad { color: #f87171; }

    .event {
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .event:last-child { border-bottom: none; }

    .gap {
      font-size: 11px;
      opacity: 0.5;
      margin: 6px 0;
    }

    .flow-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
    }

    .flow-node {
      flex: 1;
      font-size: 13px;
    }

    .flow-link {
      font-size: 11px;
      opacity: 0.8;
      white-space: nowrap;
    }

    .flow-link.triggered { color: #4ade80; }
    .flow-link.fallback { color: #f87171; }
    .flow-link.retry { color: #facc15; }
    .flow-link.chained { color: #60a5fa; }

    .anomaly {
      font-size: 12px;
      color: #f87171;
      margin-top: 6px;
    }

    .empty {
      text-align: center;
      opacity: 0.5;
      padding: 20px;
    }

    .error {
      color: #f87171;
    }
  </style>
</head>

<body>

<header class="app-header">
  <a href="trace-viewer.html" class="back-link">← Back</a>
  <h1>Trace Detail</h1>
</header>

<main class="container">
  <div id="traceDetail" class="empty">Loading trace...</div>
</main>

<script>
const TRACE_BASE =
  "https://raw.githubusercontent.com/YOUR-USERNAME/AVOT-TRACE/main/traces/";

function getTraceId() {
  const params = new URLSearchParams(window.location.search);
  return params.get("id") || params.get("trace_id");
}

/* -------------------------
   CAUSAL CLASSIFICATION
------------------------- */
function classify(prev, next) {
  const ps = (prev.status || "").toLowerCase();

  if (ps.includes("fail") || ps.includes("error")) return "fallback";
  if (prev.workflow === next.workflow) return "retry";
  if (ps.includes("success") || ps.includes("stored")) return "triggered";

  return "chained";
}

/* -------------------------
   HEALTH SCORING
------------------------- */
function computeHealth(events) {
  let score = 100;

  events.forEach(e => {
    const s = (e.status || "").toLowerCase();

    if (s.includes("fail")) score -= 20;
    else if (s.includes("error")) score -= 25;
    else score += 5;
  });

  return Math.max(0, Math.min(100, score));
}

/* -------------------------
   ANOMALY DETECTION
------------------------- */
function detectAnomalies(events) {
  let anomalies = [];

  let retryCount = 0;

  for (let i = 1; i < events.length; i++) {
    const prev = events[i - 1];
    const curr = events[i];

    if (prev.workflow === curr.workflow) {
      retryCount++;
    }
  }

  if (retryCount >= 2) {
    anomalies.push(`Retry loop detected (${retryCount + 1}x)`);
  }

  const failChain = events.filter(e =>
    (e.status || "").toLowerCase().includes("fail")
  ).length;

  if (failChain >= 2) {
    anomalies.push("Failure chain detected");
  }

  return anomalies;
}

/* -------------------------
   FLOW BUILDING (compressed)
------------------------- */
function buildFlow(events) {
  let output = [];
  let i = 0;

  while (i < events.length - 1) {
    const current = events[i];
    let count = 1;

    while (
      i + count < events.length &&
      events[i + count].workflow === current.workflow
    ) {
      count++;
    }

    const next = events[i + count];

    if (!next) break;

    const type = classify(current, next);

    output.push(`
      <div class="flow-row">
        <div class="flow-node">${current.workflow}</div>
        <div class="flow-link ${type}">
          → ${type}${count > 1 ? " ×" + count : ""}
        </div>
        <div class="flow-node">${next.workflow}</div>
      </div>
    `);

    i += count;
  }

  return output.join("");
}

/* -------------------------
   TIMELINE (with gap detection)
------------------------- */
function buildTimeline(events) {
  return events.map((e, i) => {
    let gapHTML = "";

    if (i > 0) {
      const prevTime = new Date(events[i - 1].timestamp);
      const currTime = new Date(e.timestamp);

      const diff = (currTime - prevTime) / 1000;

      if (diff > 10) {
        gapHTML = `<div class="gap">⏱ ${diff}s gap</div>`;
      }
    }

    return `
      ${gapHTML}
      <div class="event">
        <div><strong>${e.workflow}</strong></div>
        <div>${e.repo}</div>
        <div style="opacity:0.6;font-size:12px">${e.timestamp}</div>
        <div style="font-size:12px">${e.status}</div>
      </div>
    `;
  }).join("");
}

/* -------------------------
   LOAD TRACE
------------------------- */
async function loadTrace() {
  const container = document.getElementById("traceDetail");
  const traceId = getTraceId();

  if (!traceId) {
    container.innerHTML = `<div class="empty">No trace id</div>`;
    return;
  }

  try {
    const res = await fetch(`${TRACE_BASE}${traceId}.json`, { cache: "no-store" });

    if (!res.ok) {
      container.innerHTML = `<div class="empty error">Trace not found (${res.status})</div>`;
      return;
    }

    const trace = await res.json();
    const events = trace.events || [];

    if (events.length === 0) {
      container.innerHTML = `<div class="empty">No events</div>`;
      return;
    }

    const health = computeHealth(events);
    const anomalies = detectAnomalies(events);

    const healthClass =
      health > 70 ? "good" :
      health > 40 ? "warn" : "bad";

    container.innerHTML = `
      <div class="panel">
        <h3>${trace.trace_id}</h3>

        <div class="summary-line health ${healthClass}">
          Health: ${health}%
        </div>

        <div class="summary-line">
          ${events.length} events
        </div>

        ${anomalies.map(a => `<div class="anomaly">⚠ ${a}</div>`).join("")}
      </div>

      <div class="panel">
        <h3>Timeline</h3>
        ${buildTimeline(events)}
      </div>

      <div class="panel">
        <h3>Causal Flow</h3>
        ${buildFlow(events) || "<div class='empty'>No flow</div>"}
      </div>
    `;

  } catch (err) {
    console.error(err);
    container.innerHTML = `<div class="empty error">Error loading trace</div>`;
  }
}

loadTrace();
</script>

</body>
</html>
