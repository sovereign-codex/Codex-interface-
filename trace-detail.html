<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Trace Detail</title>

  <link rel="stylesheet" href="assets/css/style.css" />

  <style>
    .container { padding: 12px; }

    .panel {
      background: #1e293b;
      padding: 14px;
      margin-bottom: 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .event {
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .event:last-child { border-bottom: none; }

    .flow-arrow {
      opacity: 0.4;
      margin: 6px 0;
    }

    .empty {
      text-align: center;
      opacity: 0.5;
      padding: 20px;
    }

    .error {
      color: #f87171;
    }
  </style>
</head>

<body>

<header class="app-header">
  <a href="trace-viewer.html" class="back-link">← Back</a>
  <h1>Trace Detail</h1>
</header>

<main class="container">
  <div id="traceDetail" class="empty">Loading trace...</div>
</main>

<script>
const TRACE_BASE =
  "https://raw.githubusercontent.com/YOUR-USERNAME/AVOT-TRACE/main/traces/";

// ✅ supports both id formats
function getTraceId() {
  const params = new URLSearchParams(window.location.search);
  return params.get("id") || params.get("trace_id");
}

function buildFlow(events) {
  return events.map((e, i) => {
    const next = events[i + 1];
    if (!next) return null;
    return `<div class="flow-arrow">${e.workflow} → ${next.workflow}</div>`;
  }).filter(Boolean).join("");
}

async function loadTrace() {
  const container = document.getElementById("traceDetail");
  const traceId = getTraceId();

  if (!traceId) {
    container.innerHTML = `<div class="empty">No trace id</div>`;
    return;
  }

  try {
    const res = await fetch(`${TRACE_BASE}${traceId}.json`, { cache: "no-store" });

    if (!res.ok) {
      container.innerHTML = `<div class="empty error">Trace not found (${res.status})</div>`;
      return;
    }

    const trace = await res.json();

    if (!trace.events || trace.events.length === 0) {
      container.innerHTML = `<div class="empty">No events</div>`;
      return;
    }

    const events = trace.events;

    const timeline = events.map(e => `
      <div class="event">
        <div><strong>${e.workflow}</strong></div>
        <div>${e.repo}</div>
        <div style="opacity:0.6;font-size:12px">${e.timestamp}</div>
        <div style="font-size:12px">${e.status}</div>
      </div>
    `).join("");

    const flow = buildFlow(events);

    container.innerHTML = `
      <div class="panel">
        <h3>${trace.trace_id}</h3>
        <div style="font-size:12px;opacity:0.6">
          ${events.length} events
        </div>
      </div>

      <div class="panel">
        <h3>Timeline</h3>
        ${timeline}
      </div>

      <div class="panel">
        <h3>Causal Flow</h3>
        ${flow || "<div class='empty'>No flow yet</div>"}
      </div>
    `;

  } catch (err) {
    console.error(err);
    container.innerHTML = `<div class="empty error">Error loading trace</div>`;
  }
}

loadTrace();
</script>

</body>
</html>
