<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>System Graph</title>

<link rel="stylesheet" href="assets/css/style.css">

<style>
.container { padding: 12px; }

canvas {
  width: 100%;
  height: 60vh;
  background: #0f172a;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.05);
  touch-action: none;
}

.panel {
  background: #1e293b;
  padding: 14px;
  margin-top: 12px;
  border-radius: 12px;
}

button { margin: 6px; }
</style>
</head>

<body>

<header class="app-header">
  <a href="index.html" class="back-link">← Back</a>
  <h1>System Graph</h1>
  <p class="sub">Interactive intelligence network</p>
</header>

<main class="container">

<canvas id="graphCanvas"></canvas>

<div class="panel">
  <div>Drag to pan • Pinch to zoom • Tap node to focus • Tap second node to trace path</div>
  <div>
    <button onclick="resetView()">Reset</button>
    <button onclick="clearFocus()">Clear Focus</button>
    <button onclick="toggleHeat()">Toggle Heat</button>
  </div>
</div>

<div id="rootCauses" class="panel"></div>

</main>

<script>

/* =========================
   DATA SOURCES (NEW)
========================= */
const GRAPH_URL =
"https://raw.githubusercontent.com/sovereign-codex/Codex-net-index/main/data/system-graph.json";

const RELIABILITY_URL =
"https://raw.githubusercontent.com/sovereign-codex/Codex-net-index/main/data/node-reliability.json";

/* =========================
   CAMERA
========================= */
let camera = { x: 0, y: 0, zoom: 1 };

let dragging = false;
let lastTouch = null;

let heatEnabled = false;

/* =========================
   LOAD DATA
========================= */
async function loadData() {
  const [g, r] = await Promise.all([
    fetch(GRAPH_URL),
    fetch(RELIABILITY_URL)
  ]);

  const graph = g.ok ? await g.json() : {nodes:[],edges:[]};
  const rel = r.ok ? await r.json() : {nodes:[]};

  return {graph, rel};
}

/* =========================
   BUILD GRAPH
========================= */
function buildGraph(data) {
  const nodes = {};
  const edges = [];

  data.graph.nodes.forEach(n => {
    nodes[n.key] = {
      ...n,
      x: Math.random()*2-1,
      y: Math.random()*2-1,
      vx: 0,
      vy: 0
    };
  });

  data.graph.edges.forEach(e => {
    if (nodes[e.source] && nodes[e.target]) {
      edges.push({
        source: nodes[e.source],
        target: nodes[e.target],
        type: e.type
      });
    }
  });

  // attach reliability
  const reliabilityMap = {};
  data.rel.nodes.forEach(n => {
    reliabilityMap[n.key] = n.score;
  });

  Object.values(nodes).forEach(n => {
    n.health = reliabilityMap[n.key] || 100;
  });

  return {nodes:Object.values(nodes), edges};
}

/* =========================
   STABLE SIMULATION
========================= */
function simulate(graph) {
  const centerForce = 0.001;

  graph.nodes.forEach(n => {
    n.vx += -n.x * centerForce;
    n.vy += -n.y * centerForce;
  });

  for (let i=0;i<graph.nodes.length;i++){
    for (let j=i+1;j<graph.nodes.length;j++){
      let a = graph.nodes[i];
      let b = graph.nodes[j];

      let dx = a.x - b.x;
      let dy = a.y - b.y;
      let dist = Math.sqrt(dx*dx+dy*dy)+0.05;

      let force = 0.002 / dist;

      a.vx += dx*force;
      a.vy += dy*force;
      b.vx -= dx*force;
      b.vy -= dy*force;
    }
  }

  graph.edges.forEach(e=>{
    let dx = e.target.x - e.source.x;
    let dy = e.target.y - e.source.y;

    e.source.vx += dx*0.0015;
    e.source.vy += dy*0.0015;
    e.target.vx -= dx*0.0015;
    e.target.vy -= dy*0.0015;
  });

  graph.nodes.forEach(n=>{
    n.x += n.vx;
    n.y += n.vy;

    // damping + clamp (prevents "fly away")
    n.vx *= 0.8;
    n.vy *= 0.8;

    n.x = Math.max(-5, Math.min(5, n.x));
    n.y = Math.max(-5, Math.min(5, n.y));
  });
}

/* =========================
   PATH FINDING
========================= */
let focusNode = null;
let pathTarget = null;

function findPath(graph, start, end) {
  let visited = new Set();
  let queue = [[start]];

  while (queue.length) {
    let path = queue.shift();
    let node = path[path.length-1];

    if (node === end) return path;

    if (!visited.has(node)) {
      visited.add(node);

      graph.edges.forEach(e=>{
        if (e.source===node) queue.push([...path,e.target]);
        if (e.target===node) queue.push([...path,e.source]);
      });
    }
  }

  return [];
}

/* =========================
   DRAW
========================= */
function draw(canvas, graph) {
  const ctx = canvas.getContext("2d");

  function resize() {
    canvas.width = canvas.clientWidth;
    canvas.height = canvas.clientHeight;
  }
  resize();
  window.addEventListener("resize", resize);

  function worldToScreen(x,y){
    return {
      x:(x-camera.x)*camera.zoom + canvas.width/2,
      y:(y-camera.y)*camera.zoom + canvas.height/2
    };
  }

  function loop(){
    simulate(graph);
    ctx.clearRect(0,0,canvas.width,canvas.height);

    let path = [];
    if (focusNode && pathTarget) {
      path = findPath(graph,focusNode,pathTarget);
    }

    // EDGES
    graph.edges.forEach(e=>{
      const a = worldToScreen(e.source.x,e.source.y);
      const b = worldToScreen(e.target.x,e.target.y);

      let highlight = path.includes(e.source) && path.includes(e.target);

      ctx.strokeStyle = highlight ? "#4ade80" : "rgba(255,255,255,0.1)";
      ctx.lineWidth = highlight ? 2 : 1;

      ctx.beginPath();
      ctx.moveTo(a.x,a.y);
      ctx.lineTo(b.x,b.y);
      ctx.stroke();
    });

    // NODES
    graph.nodes.forEach(n=>{
      const p = worldToScreen(n.x,n.y);

      ctx.beginPath();
      ctx.arc(p.x,p.y,6,0,Math.PI*2);

      if (heatEnabled) {
        const g = Math.floor((n.health/100)*255);
        const r = 255-g;
        ctx.fillStyle = `rgb(${r},${g},80)`;
      } else if (n === focusNode) {
        ctx.fillStyle="#facc15";
      } else if (n.kind==="trace") {
        ctx.fillStyle="#4ade80";
      } else {
        ctx.fillStyle="#60a5fa";
      }

      ctx.fill();
    });

    requestAnimationFrame(loop);
  }

  loop();

  /* =========================
     INTERACTION
  ========================= */
  canvas.addEventListener("click", e=>{
    const rect = canvas.getBoundingClientRect();

    const mx = (e.clientX-rect.left - canvas.width/2)/camera.zoom + camera.x;
    const my = (e.clientY-rect.top - canvas.height/2)/camera.zoom + camera.y;

    let closest=null;
    let minDist=0.08;

    graph.nodes.forEach(n=>{
      let dx=n.x-mx;
      let dy=n.y-my;
      let d=Math.sqrt(dx*dx+dy*dy);

      if (d<minDist){
        minDist=d;
        closest=n;
      }
    });

    if (!closest) return;

    if (!focusNode){
      focusNode = closest;
      camera.x = closest.x;
      camera.y = closest.y;
      camera.zoom = 1.4;
    } else if (!pathTarget){
      pathTarget = closest;
    } else {
      focusNode = null;
      pathTarget = null;
    }
  });

  canvas.addEventListener("touchmove", e=>{
    if (e.touches.length===1){
      let t=e.touches[0];

      if (lastTouch){
        camera.x -= (t.clientX-lastTouch.x)/200;
        camera.y -= (t.clientY-lastTouch.y)/200;
      }

      lastTouch = {x:t.clientX,y:t.clientY};
    }
  });

  canvas.addEventListener("touchend", ()=> lastTouch=null);
}

/* =========================
   UI
========================= */
function resetView(){
  camera = {x:0,y:0,zoom:1};
}

function clearFocus(){
  focusNode = null;
  pathTarget = null;
}

function toggleHeat(){
  heatEnabled = !heatEnabled;
}

/* =========================
   ROOT CAUSE
========================= */
function renderRoot(graph){
  const box = document.getElementById("rootCauses");

  const scores = graph.nodes.map(n=>{
    let degree = graph.edges.filter(e=>e.source===n||e.target===n).length;
    return {id:n.id,score:degree};
  }).sort((a,b)=>b.score-a.score).slice(0,5);

  box.innerHTML = `
    <h3>Root Cause Candidates</h3>
    ${scores.map(s=>`<div>${s.id} (score ${s.score})</div>`).join("")}
  `;
}

/* =========================
   INIT
========================= */
async function init(){
  const canvas = document.getElementById("graphCanvas");

  const data = await loadData();
  const graph = buildGraph(data);

  draw(canvas, graph);
  renderRoot(graph);
}

init();

</script>
</body>
</html>
