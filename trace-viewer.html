<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trace Viewer</title>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      background: #0f1115;
      color: #e6e6e6;
      padding: 16px;
    }

    .trace {
      background: #1a1d23;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
    }

    .trace-id {
      font-weight: bold;
      font-size: 14px;
      color: #6ae3ff;
    }

    .meta {
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>
<body>

<h2>Trace Index</h2>
<div id="traces"></div>

<script>
const INDEX_URL = "https://raw.githubusercontent.com/sovereign-codex/AVOT-TRACE/main/data/trace-index.json";

async function loadTraces() {
  const res = await fetch(INDEX_URL);
  const data = await res.json();

  const container = document.getElementById("traces");
  container.innerHTML = "";

  data.traces.forEach(trace => {
    const div = document.createElement("div");
    div.className = "trace";

    div.innerHTML = `
      <div class="trace-id">${trace.trace_id}</div>
      <div class="meta">${trace.last_status} • ${trace.last_repo}</div>
    `;

    div.onclick = () => {
      window.location.href = `trace-detail.html?trace=${trace.trace_id}`;
    };

    container.appendChild(div);
  });
}

loadTraces();
</script>

</body>
</html>
