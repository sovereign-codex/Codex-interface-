<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Trace Viewer</title>

  <link rel="stylesheet" href="assets/css/style.css" />

  <style>
    .trace-container {
      padding: 12px;
    }

    .trace-card {
      background: #1e293b;
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.15s ease;
      border: 1px solid rgba(255,255,255,0.04);
    }

    .trace-card:active {
      transform: scale(0.98);
    }

    .trace-card:hover {
      background: #334155;
    }

    .trace-id {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 4px;
      word-break: break-all;
    }

    .trace-flow {
      font-size: 13px;
      opacity: 0.9;
    }

    .trace-meta {
      font-size: 11px;
      opacity: 0.6;
      margin-top: 6px;
    }

    .trace-status {
      margin-left: 6px;
      font-weight: 500;
    }

    .ok { color: #4ade80; }
    .fail { color: #f87171; }
    .warn { color: #facc15; }

    .empty {
      opacity: 0.5;
      font-size: 13px;
      padding: 20px;
      text-align: center;
    }

    .error {
      color: #f87171;
    }
  </style>
</head>

<body>

<header class="app-header">
  <a href="index.html" class="back-link">← Back</a>
  <h1>Trace Viewer</h1>
  <p class="sub">Execution trace feed</p>
</header>

<main class="trace-container">
  <div id="traceContainer" class="empty">Loading traces...</div>
</main>

<script>
const DATA_PATH = "data/trace-index.json";

function statusClass(status) {
  if (!status) return "";
  if (status.includes("fail") || status.includes("error")) return "fail";
  if (status.includes("warn")) return "warn";
  return "ok";
}

async function loadTraces() {
  const container = document.getElementById("traceContainer");

  try {
    const res = await fetch(DATA_PATH, { cache: "no-store" });

    if (!res.ok) {
      container.innerHTML = `
        <div class="empty error">
          Failed to load trace data (${res.status})
        </div>
      `;
      return;
    }

    const data = await res.json();

    if (!data || !Array.isArray(data.traces) || data.traces.length === 0) {
      container.innerHTML = `<div class="empty">No traces available yet</div>`;
      return;
    }

    container.innerHTML = "";

    const traces = [...data.traces].reverse();

    traces.forEach(trace => {
      const el = document.createElement("div");
      el.className = "trace-card";

      const traceId = trace.trace_id || "unknown";
      const repo = trace.repo || "unknown-repo";
      const workflow = trace.workflow || "unknown-workflow";
      const status = trace.status || "unknown";
      const timestamp = trace.latest || ""; // ✅ FIXED
      const count = trace.event_count || 0;

      el.innerHTML = `
        <div class="trace-id">${traceId}</div>
        <div class="trace-flow">${repo} → ${workflow}</div>
        <div class="trace-meta">
          ${timestamp}
          <span class="trace-status ${statusClass(status)}">${status}</span>
          • ${count} events
        </div>
      `;

      el.onclick = () => {
        window.location.href = `trace-detail.html?id=${encodeURIComponent(traceId)}`;
      };

      container.appendChild(el);
    });

  } catch (err) {
    console.error(err);
    container.innerHTML = `
      <div class="empty error">
        Error loading traces<br/>Check console
      </div>
    `;
  }
}

loadTraces();
</script>

</body>
</html>
