<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trace Viewer</title>

  <!-- Shared styling -->
  <link rel="stylesheet" href="assets/css/style.css" />

  <style>
    .trace-card {
      background: #1e293b;
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.15s ease;
    }

    .trace-card:hover {
      background: #334155;
    }

    .trace-id {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .trace-flow {
      font-size: 13px;
      opacity: 0.9;
    }

    .trace-meta {
      font-size: 11px;
      opacity: 0.6;
      margin-top: 6px;
    }

    .empty {
      opacity: 0.5;
      font-size: 13px;
      padding: 20px;
    }
  </style>
</head>

<body>

<h2>Trace Viewer</h2>
<div id="traceContainer">Loading...</div>

<script>
const DATA_PATH = "data/trace-relationship-index.json";

async function loadTraces() {
  const container = document.getElementById("traceContainer");

  try {
    const res = await fetch(DATA_PATH);

    if (!res.ok) {
      container.innerHTML = `<div class="empty">Failed to load trace data</div>`;
      return;
    }

    const data = await res.json();

    if (!data.traces || data.traces.length === 0) {
      container.innerHTML = `<div class="empty">No traces available</div>`;
      return;
    }

    container.innerHTML = "";

    // Show newest first
    const traces = [...data.traces].reverse();

    traces.forEach(trace => {
      const el = document.createElement("div");
      el.className = "trace-card";

      const traceId = trace.trace_id || "unknown";
      const repo = trace.repo || "unknown-repo";
      const workflow = trace.workflow || "unknown-workflow";
      const status = trace.status || "unknown";
      const timestamp = trace.timestamp || "";

      el.innerHTML = `
        <div class="trace-id">${traceId}</div>
        <div class="trace-flow">${repo} → ${workflow}</div>
        <div class="trace-meta">${status} • ${timestamp}</div>
      `;

      // Navigate to detail view
      el.onclick = () => {
        window.location.href = `trace-detail.html?trace_id=${encodeURIComponent(traceId)}`;
      };

      container.appendChild(el);
    });

  } catch (err) {
    console.error(err);
    container.innerHTML = `<div class="empty">Error loading traces</div>`;
  }
}

loadTraces();
</script>

</body>
</html>
