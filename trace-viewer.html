<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Trace Viewer</title>

<link rel="stylesheet" href="assets/css/style.css" />

<style>
.trace-container { padding: 12px; }

.trace-card {
  background: #1e293b;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 12px;
  cursor: pointer;
  border: 1px solid rgba(255,255,255,0.04);
}

.trace-id { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
.trace-flow { font-size: 13px; opacity: 0.9; }

.trace-meta {
  font-size: 11px;
  opacity: 0.7;
  margin-top: 6px;
}

.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 10px;
}

.chip {
  background: #17233d;
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 12px;
  border: 1px solid rgba(255,255,255,0.08);
}

.flag {
  font-size: 10px;
  margin-left: 6px;
  opacity: 0.7;
}

.score {
  font-size: 11px;
  opacity: 0.6;
  float: right;
}

button {
  margin-right: 6px;
  margin-bottom: 10px;
}

.empty {
  text-align: center;
  padding: 20px;
  opacity: 0.5;
}
</style>
</head>

<body>

<header class="app-header">
  <a href="index.html" class="back-link">← Back</a>
  <h1>Trace Viewer</h1>
  <p class="sub">Execution trace feed</p>
</header>

<main class="trace-container">

<div id="filters"></div>

<div>
  <button onclick="setQuick('all')">All</button>
  <button onclick="setQuick('fail')">Failures</button>
  <button onclick="setQuick('recent')">Recent</button>
</div>

<div id="traceContainer" class="empty">Loading traces...</div>

</main>

<script>
const DATA_PATH = "data/trace-index.json";

/* =========================
   PARAMS
========================= */
function getParams() {
  const p = new URLSearchParams(window.location.search);
  return {
    node: p.get("node"),
    status: p.get("status"),
    repo: p.get("repo")
  };
}

/* =========================
   FILTER LOGIC
========================= */
function applyFilters(traces, filters) {
  let result = [...traces];

  if (filters.node) {
    result = result.filter(t =>
      (t.nodes || []).includes(filters.node)
    );
  }

  if (filters.status) {
    result = result.filter(t =>
      (t.status || "").includes(filters.status)
    );
  }

  if (filters.repo) {
    result = result.filter(t =>
      (t.repo || "").includes(filters.repo)
    );
  }

  return result;
}

/* =========================
   QUICK MODES
========================= */
function setQuick(mode) {
  const url = new URL(window.location);

  if (mode === "all") {
    url.search = "";
  }

  if (mode === "fail") {
    url.searchParams.set("status", "fail");
  }

  if (mode === "recent") {
    url.search = "";
    url.searchParams.set("recent", "1");
  }

  window.location.href = url.toString();
}

/* =========================
   FILTER CHIPS
========================= */
function renderFilters(filters) {
  const box = document.getElementById("filters");

  let chips = [];

  if (filters.node) chips.push(`node: ${filters.node}`);
  if (filters.status) chips.push(`status: ${filters.status}`);
  if (filters.repo) chips.push(`repo: ${filters.repo}`);

  if (!chips.length) {
    box.innerHTML = "";
    return;
  }

  box.innerHTML = `
    <div class="chips">
      ${chips.map(c => `<div class="chip">${c}</div>`).join("")}
    </div>
  `;
}

/* =========================
   RENDER
========================= */
function renderTraces(traces) {
  const container = document.getElementById("traceContainer");

  if (!traces.length) {
    container.innerHTML = `<div class="empty">No matching traces</div>`;
    return;
  }

  container.innerHTML = "";

  traces.forEach(trace => {
    const el = document.createElement("div");
    el.className = "trace-card";

    const flags = (trace.flags || []).map(f =>
      `<span class="flag">⚠ ${f}</span>`
    ).join("");

    el.innerHTML = `
      <div class="trace-id">
        ${trace.trace_id}
        <span class="score">${trace.score}</span>
      </div>

      <div class="trace-flow">
        ${trace.repo} → ${trace.workflow}
      </div>

      <div class="trace-meta">
        ${trace.latest} • ${trace.phase}
        ${flags}
      </div>
    `;

    el.onclick = () => {
      window.location.href =
        `trace-detail.html?id=${encodeURIComponent(trace.trace_id)}`;
    };

    container.appendChild(el);
  });
}

/* =========================
   LOAD
========================= */
async function loadTraces() {
  const container = document.getElementById("traceContainer");

  try {
    const res = await fetch(DATA_PATH, { cache: "no-store" });

    if (!res.ok) {
      container.innerHTML = `<div class="empty">Failed to load</div>`;
      return;
    }

    const data = await res.json();
    const filters = getParams();

    let traces = data.traces || [];

    traces = applyFilters(traces, filters);

    if (new URLSearchParams(window.location.search).get("recent")) {
      traces = traces.slice(0, 10);
    }

    renderFilters(filters);
    renderTraces(traces);

  } catch (err) {
    container.innerHTML = `<div class="empty">Error loading traces</div>`;
  }
}

loadTraces();
</script>

</body>
</html>
