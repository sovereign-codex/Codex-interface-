<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Node Timeline</title>

  <link rel="stylesheet" href="assets/css/style.css">

  <style>
    .container { padding: 12px; }

    .panel {
      background: #1e293b;
      padding: 14px;
      margin-bottom: 14px;
      border-radius: 12px;
    }

    .event {
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .event:last-child { border-bottom: none; }

    .meta {
      font-size: 12px;
      opacity: 0.6;
    }

    .status-good { color: #4ade80; }
    .status-warn { color: #facc15; }
    .status-bad { color: #f87171; }

    .score {
      font-size: 22px;
      font-weight: bold;
    }

    .trend {
      font-size: 13px;
      margin-top: 6px;
    }

    .stable { color: #4ade80; }
    .degraded { color: #facc15; }
    .critical { color: #f87171; }

    .empty {
      text-align: center;
      opacity: 0.5;
      padding: 20px;
    }
  </style>
</head>

<body>

<header class="app-header">
  <a href="graph-viewer.html" class="back-link">← Back</a>
  <h1>Node Timeline</h1>
</header>

<main class="container">
  <div id="content" class="empty">Loading...</div>
</main>

<script>
const TRACE_INDEX =
  "https://raw.githubusercontent.com/sovereign-codex/AVOT-TRACE/main/data/trace-index.json";

const TRACE_BASE =
  "https://raw.githubusercontent.com/sovereign-codex/AVOT-TRACE/main/traces/";

const RELIABILITY =
  "https://raw.githubusercontent.com/sovereign-codex/Codex-net-index/main/data/node-reliability.json";

/* -------------------------
   UTIL
------------------------- */
function getNodeId() {
  const params = new URLSearchParams(window.location.search);
  return params.get("node");
}

function classifyStatus(status) {
  const s = (status || "").toLowerCase();

  if (s.includes("fail") || s.includes("error")) return "status-bad";
  if (s.includes("warn") || s.includes("unknown")) return "status-warn";
  return "status-good";
}

/* -------------------------
   TREND DETECTION
------------------------- */
function detectTrend(events) {
  const recent = events.slice(-5);

  let score = 0;

  recent.forEach(e => {
    const s = (e.status || "").toLowerCase();

    if (s.includes("fail")) score -= 2;
    else if (s.includes("warn")) score -= 1;
    else score += 1;
  });

  if (score >= 3) return { label: "Improving", class: "stable" };
  if (score <= -3) return { label: "Degrading", class: "critical" };
  return { label: "Unstable", class: "degraded" };
}

/* -------------------------
   LOAD NODE DATA
------------------------- */
async function loadNode() {
  const nodeId = getNodeId();
  const container = document.getElementById("content");

  if (!nodeId) {
    container.innerHTML = `<div class="empty">No node selected</div>`;
    return;
  }

  try {
    const [indexRes, reliabilityRes] = await Promise.all([
      fetch(TRACE_INDEX, { cache: "no-store" }),
      fetch(RELIABILITY, { cache: "no-store" })
    ]);

    const index = indexRes.ok ? await indexRes.json() : { traces: [] };
    const reliability = reliabilityRes.ok ? await reliabilityRes.json() : { nodes: [] };

    const relNode = reliability.nodes.find(n =>
      n.node_id === nodeId
    );

    /* -------------------------
       COLLECT EVENTS
    ------------------------- */
    let allEvents = [];

    for (const t of index.traces || []) {
      if (!t.trace_id) continue;

      const res = await fetch(`${TRACE_BASE}${t.trace_id}.json`, { cache: "no-store" });
      if (!res.ok) continue;

      const trace = await res.json();

      trace.events.forEach(e => {
        if (e.repo === nodeId || e.workflow === nodeId) {
          allEvents.push(e);
        }
      });
    }

    if (!allEvents.length) {
      container.innerHTML = `<div class="empty">No activity for node</div>`;
      return;
    }

    // sort by time
    allEvents.sort((a,b)=> new Date(a.timestamp) - new Date(b.timestamp));

    const trend = detectTrend(allEvents);

    /* -------------------------
       RENDER
    ------------------------- */
    container.innerHTML = `
      <div class="panel">
        <h3>${nodeId}</h3>

        ${relNode ? `
          <div class="score">${relNode.score}</div>
          <div class="${relNode.state}">${relNode.state.toUpperCase()}</div>

          <div class="meta">
            events: ${relNode.events} • failures: ${relNode.failures} • warnings: ${relNode.warnings}
          </div>
        ` : `<div class="meta">No reliability data</div>`}

        <div class="trend ${trend.class}">
          Trend: ${trend.label}
        </div>
      </div>

      <div class="panel">
        <h3>Event Timeline</h3>
        ${allEvents.map(e => `
          <div class="event">
            <div><strong>${e.workflow}</strong></div>
            <div class="meta">${e.repo}</div>
            <div class="meta">${e.timestamp}</div>
            <div class="${classifyStatus(e.status)}">${e.status}</div>
          </div>
        `).join("")}
      </div>
    `;

  } catch (err) {
    console.error(err);
    container.innerHTML = `<div class="empty">Error loading node</div>`;
  }
}

loadNode();
</script>

</body>
</html>
